# Aegis Wallet — infrastructure only
#
# The MCP server (ln-mcp npm package) runs on the
# user's machine and connects to LND REST (port 8080) from outside
# Docker. This stack is the wallet's backend — not the MCP.
#
# Usage:
#   docker compose up -d
#   docker compose down
#   docker compose down -v          # delete all data

services:
  # Remote signer — holds private keys, signs transactions
  signer:
    image: lightninglabs/lnd:v0.20.0-beta
    container_name: aegis-signer
    restart: unless-stopped
    entrypoint: >
      /bin/sh -c "
        touch /root/.lnd/wallet-password.txt &&
        cp /tmp/lnd.conf /root/.lnd/lnd.conf &&
        exec lnd
      "
    ports:
      - "${SIGNER_RPC_PORT:-10012}:10012"
      - "${SIGNER_REST_PORT:-10013}:10013"
    volumes:
      - signer-data:/root/.lnd
      - ./docker/signer-lnd.conf.template:/tmp/lnd.conf:ro
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - aegis

  # Lightning Terminal — watch-only node, no private keys
  litd:
    image: lightninglabs/lightning-terminal:v0.16.0-alpha
    container_name: aegis-litd
    restart: unless-stopped
    depends_on:
      - signer
    entrypoint: >
      /bin/sh -c "
        touch /root/.lnd/wallet-password.txt &&
        cp /tmp/lit.conf /root/.lit/lit.conf &&
        exec litd
      "
    ports:
      - "${LITD_HTTPS_PORT:-8443}:8443"
      - "${LND_GRPC_PORT:-10009}:10009"
      - "${LND_P2P_PORT:-9735}:9735"
      - "${LND_REST_PORT:-8080}:8080"
    volumes:
      - litd-data:/root/.lnd
      - litd-lit-data:/root/.lit
      - ./docker/litd.conf.template:/tmp/lit.conf:ro
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - aegis

  # Go LND Gateway — direct gRPC to LND, REST API for backend + MCP
  lnd-gateway:
    build:
      context: ./lnd-gateway
      dockerfile: Dockerfile
    container_name: aegis-lnd-gateway
    restart: unless-stopped
    depends_on:
      - litd
    ports:
      - "${GATEWAY_PORT:-3003}:3003"
    environment:
      - LND_GATEWAY_LISTEN=:3003
      - LND_GRPC_HOST=litd:10009
      - LND_CERT_PATH=/certs/tls.cert
      - LND_MACAROON_PATH=/certs/admin.macaroon
      - LITD_HOST=https://litd:8443
      - LIT_MACAROON_PATH=/lit-certs/lit.macaroon
    volumes:
      - litd-data:/certs:ro
      - litd-lit-data:/lit-certs:ro
    networks:
      - aegis

  # Aegis backend — thin proxy to LND gateway + webhook receiver
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegis-backend
    restart: unless-stopped
    depends_on:
      - lnd-gateway
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      - PORT=3001
      - LND_GATEWAY_URL=http://lnd-gateway:3003
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    networks:
      - aegis

  # Aegis web — Next.js frontend
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: aegis-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    networks:
      - aegis

volumes:
  signer-data:
  litd-data:
  litd-lit-data:

networks:
  aegis:
    driver: bridge
